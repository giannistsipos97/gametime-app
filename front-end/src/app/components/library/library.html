<div class="gt-page">
  <h2 class="text-center text-2xl font-bold sm:text-3xl">My Library</h2>

  <div class="mx-auto flex w-full max-w-2xl flex-col justify-center gap-3 py-5 sm:flex-row">
    <p-multiselect
      [options]="playedOptions"
      optionLabel="label"
      placeholder="Played"
      styleClass="w-full sm:w-56 !rounded-3xl"
    />
    <p-multiselect
      [options]="platforms"
      placeholder="Select Platforms"
      optionLabel="label"
      styleClass="w-full sm:w-56 !rounded-3xl"
      display="chip"
    >
      <ng-template let-platform pTemplate="item">
        <div class="flex items-center gap-2">
          <i class="{{platform.icon}}" style="width: 20px"></i>
          <div>{{ platform.label }}</div>
        </div>
      </ng-template>
    </p-multiselect>
  </div>

  @if (libraryGames$ | async; as libraryGames) {
    @if (libraryGames.length > 0) {
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 sm:gap-5 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5">
        @for (game of libraryGames; track trackGame(game)) {
          <p-card
            class="gt-card cursor-pointer"
          >
            <ng-template #header>
              <img
                [routerLink]="['/gameDetails', game.id]"
                class="h-44 w-full object-cover"
                [src]="game.background_image"
                [alt]="game.name"
              />
            </ng-template>

            <ng-template #title>
              <div class="flex items-center justify-between">
                <span [routerLink]="['/gameDetails', game.id]" class="text-lg font-bold line-clamp-1">
                  {{ game.name }}
                </span>
              </div>
            </ng-template>

            <ng-template #subtitle>
              <div class="mt-3 flex items-center justify-between gap-3">
                <div class="gt-on-surface shrink-0 font-medium">
                  {{ game.rating }}
                  <i class="pi pi-star-fill text-yellow-500"></i>
                </div>
                <div class="flex shrink-0 items-center gap-1">
                  <button
                    pButton
                    class="gt-icon-button text-black"
                    [ngClass]="game.playNext ? '!bg-[#D48806] hover:!bg-yellow-900 border-[#D48806]' : '!bg-white border-slate-400 hover:!bg-[#D48806]'"
                    pTooltip="Add to Play Next"
                    tooltipPosition="bottom"
                    (click)="confirmPlayNext(game)"
                  >
                    <i class="fa-solid fa-angles-right"></i>
                  </button>
                  <button
                    pButton
                    class="gt-icon-button border-red-700 bg-white text-black hover:bg-red-700"
                    pTooltip="Remove from Library"
                    tooltipPosition="bottom"
                    (click)="confirmDelete(game)"
                  >
                    <i class="fa-solid fa-minus"></i>
                  </button>
                  <button
                    pButton
                    class="gt-icon-button text-black"
                    [ngClass]="game.played ? '!bg-green-600 hover:!bg-green-950 border-green-600' : '!bg-white border-slate-400 hover:!bg-green-600'"
                    pTooltip="Add to Played"
                    tooltipPosition="bottom"
                    (click)="game.played ? removedFromPlayed(game) : displayDialog(game)"
                  >
                    <i class="fas fa-check"></i>
                  </button>
                </div>
              </div>
            </ng-template>
          </p-card>
        }
      </div>
    } @else {
      <div class="flex min-h-80 items-center justify-center rounded-2xl border border-dashed border-white/20 bg-[#0e1330] p-8 text-center">
        <h2 class="text-2xl font-bold text-white/80 sm:text-4xl">Your library is empty</h2>
      </div>
    }
  }
</div>

@if (displayCompletedDialog) {
  <app-complete-dialog
    [title]="'Game Completion Details'"
    [selectedGame]="selectedGame"
    (closeDialog)="displayCompletedDialog = $event"
    (updateCurrentlyPlaying)="onGameCompleted($event)"
  ></app-complete-dialog>
}

<p-confirmDialog header="Confirmation" icon="pi pi-exclamation-triangle"></p-confirmDialog>
