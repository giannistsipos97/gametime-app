<div class="container-form flex justify-center items-center text-white">
  <div class="bg-[#23337e] p-10 rounded-2xl shadow-xl w-full max-w-md">
    <h2 class="text-3xl font-bold text-center mb-8">Log In</h2>

    <form #registerForm="ngForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Username -->
      <div>
        <label for="username" class="block text-sm font-medium mb-2 ml-2">Username</label>
        <input
          pInputText
          type="text"
          [(ngModel)]="user.username"
          name="username"
          id="username"
          placeholder="Enter your username"
          class="w-full h-12 px-4 border border-gray-600 focus:border-[#445ce3] outline-none"
          #username="ngModel"
          required
        />
        @if(username.invalid && username.touched){
        <span class="text-red-500 text-sm mt-1 ml-2"> Username is required </span>
        }
      </div>

      <!-- Password -->
      <div>
        <label for="password" class="block text-sm font-medium mb-2 ml-2">Password</label>
        <input
          pInputText
          type="password"
          [(ngModel)]="user.password"
          name="password"
          id="password"
          placeholder="Enter your password"
          class="w-full h-12 px-4 bg-[#0e1330] border border-gray-600 focus:border-[#445ce3] outline-none"
          #password="ngModel"
          required
        />
        @if(password.invalid && password.touched){
        <span class="text-red-500 text-sm mt-1 ml-2">Password is required </span>
        }
      </div>

      <!-- Submit Button -->
      <button
        pButton
        type="submit"
        [disabled]="registerForm.invalid"
        class="w-full h-12 bg-[#334de0] hover:bg-[#163e8c] cursor-pointer transition-colors duration-200 text-lg font-semibold"
      >
        Log In
      </button>

      <p class="text-center text-m mt-4">
        Don't have an account?
        <a routerLink="/register" class="text-[#030e4e] hover:underline cursor-pointer font-bold">Sign Up</a>
      </p>

      <button
        pButton
        type="button"
        class="w-full bg-transparent border-none text-white hover:text-[#d48806] underline"
        (click)="showResetPassword = !showResetPassword"
      >
        Forgot password?
      </button>
    </form>

    @if(showResetPassword){
    <form #resetForm="ngForm" (ngSubmit)="resetPassword()" class="space-y-4 mt-8 border-t border-white/30 pt-6">
      <h3 class="text-xl font-bold text-center">Reset Password</h3>

      <div>
        <label for="resetUsername" class="block text-sm font-medium mb-2 ml-2">Username</label>
        <input
          pInputText
          type="text"
          [(ngModel)]="resetUser.username"
          name="resetUsername"
          id="resetUsername"
          placeholder="Enter your username"
          class="w-full h-12 px-4 border border-gray-600 focus:border-[#445ce3] outline-none"
          required
        />
      </div>

      <div>
        <label for="resetEmail" class="block text-sm font-medium mb-2 ml-2">Email</label>
        <input
          pInputText
          type="email"
          [(ngModel)]="resetUser.email"
          name="resetEmail"
          id="resetEmail"
          placeholder="Enter your email"
          class="w-full h-12 px-4 border border-gray-600 focus:border-[#445ce3] outline-none"
          required
        />
      </div>

      <div>
        <label for="newPassword" class="block text-sm font-medium mb-2 ml-2">New Password</label>
        <input
          pInputText
          type="password"
          [(ngModel)]="resetUser.password"
          name="newPassword"
          id="newPassword"
          placeholder="Enter a new password"
          class="w-full h-12 px-4 border border-gray-600 focus:border-[#445ce3] outline-none"
          required
        />
      </div>

      <div>
        <label for="confirmNewPassword" class="block text-sm font-medium mb-2 ml-2">Confirm New Password</label>
        <input
          pInputText
          type="password"
          [(ngModel)]="resetUser.confirmPassword"
          name="confirmNewPassword"
          id="confirmNewPassword"
          placeholder="Confirm your new password"
          class="w-full h-12 px-4 border border-gray-600 focus:border-[#445ce3] outline-none"
          required
        />
      </div>

      <button
        pButton
        type="submit"
        [disabled]="resetForm.invalid"
        class="w-full h-12 bg-[#d48806] hover:bg-[#9e6707] cursor-pointer transition-colors duration-200 text-lg font-semibold"
      >
        Reset Password
      </button>
    </form>
    }
  </div>
</div>
