<div class="gt-page">
  <p-dataView [value]="wishlistGames" layout="list" styleClass="w-full">
    <ng-template pTemplate="empty">
      <div class="rounded-2xl border border-dashed border-white/20 bg-[#0e1330] px-4 py-10 text-center text-xl text-gray-300">
        Your wishlist is empty <br />
        Add some games to see them here!
      </div>
    </ng-template>

    <ng-template #list let-game>
      @for (game of wishlistGames; track game.id) {
      <div class="gt-card mb-4 flex w-full flex-col items-stretch gap-4 p-4 sm:flex-row sm:items-center">
        <img [src]="game.background_image" alt="{{ game.name }}" class="h-44 w-full rounded-md object-cover sm:w-56 lg:w-72" />

        <div [routerLink]="['/gameDetails', game.id]" class="flex min-w-0 flex-1 cursor-pointer flex-col gap-2 sm:pl-2">
          <h2 class="line-clamp-2 text-xl font-bold sm:text-2xl">{{ game.name }}</h2>

          <div class="flex flex-col flex-wrap justify-center gap-2 md:justify-start">
            <div class="flex flex-wrap gap-2">
              @for (platform of game.parent_platforms; track platform.platform.id) {
              <i
                class="{{ platform.platform.name | platformIcon }}"
                [pTooltip]="platform.platform.name"
                tooltipPosition="bottom"
              ></i>
              }
            </div>
            <div class="text-xl text-yellow-500">
              <i [ngClass]="game.rating < 5 ? 'fa-solid fa-star-half-stroke' : 'fa-solid fa-star'"></i>
              {{ game.rating }}
            </div>
          </div>
        </div>

        <div class="flex w-full flex-col gap-2 sm:w-auto sm:min-w-40">
          @if(!libraryService.hasGame(game.id)){
          <button pButton class="w-full justify-center" (click)="addToLibrary(game)">
            <i class="pi pi-plus mr-2"></i>
            Add to Library
          </button>
          }
          <button pButton class="w-full justify-center" severity="secondary" (click)="removeFromWishlist(game.id)">
            <i class="pi pi-times mr-2"></i>
            Remove
          </button>
        </div>
      </div>
      }
    </ng-template>
  </p-dataView>
</div>
